name: colcon

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
        - {distribution: "jazzy", WARNING_AS_ERROR: "ON"}
        - {distribution: "lyrical", WARNING_AS_ERROR: "ON"}

    container:
      image: ros:${{ matrix.distribution }}-ros-core

    steps:
    - name: install dependencies
      run: |
        apt update
        apt install -y --no-install-recommends python3-rosdep python3-vcstool python3-colcon-common-extensions
        apt install -y --no-install-recommends python3-colcon-coveragepy-result python3-colcon-lcov-result lcov
        apt install -y --no-install-recommends git build-essential
        rosdep init

    - uses: actions/checkout@v6
      with:
        sparse-checkout: .github/workflows/libfranka.repos
        sparse-checkout-cone-mode: false

    - uses: ros-tooling/action-ros-ci@v0.4
      with:
        target-ros2-distro: ${{ matrix.distribution }}
        vcs-repo-file-url: ${{ github.workspace }}/.github/workflows/libfranka.repos
        rosdep-skip-keys: "moveit_ros_move_group moveit_resources_panda_moveit_config moveit_kinematics moveit_planners_ompl moveit_simple_controller_manager moveit_ros_visualization"
        extra-cmake-args: "-D CMAKE_BUILD_TYPE=Release -D BUILD_EXAMPLES=OFF -D CMAKE_COMPILE_WARNING_AS_ERROR=${{ matrix.WARNING_AS_ERROR }}"
